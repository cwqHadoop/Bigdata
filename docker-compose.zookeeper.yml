# ===============================================
# ZooKeeper集群Docker Compose配置文件
# 作用：定义ZooKeeper分布式协调服务的容器编排配置
# 原理：使用3节点集群实现高可用和容错能力
# 架构：3节点仲裁集群，确保在单节点故障时仍能正常工作
# ===============================================

version: '3.8'

services:
  # ===============================================
  # ZooKeeper节点1配置
  # 作用：ZooKeeper集群的第一个节点
  # 原理：每个节点有唯一的ID，通过配置文件形成集群
  # 端口映射：2181是ZooKeeper的标准客户端端口
  # ===============================================
  zoo1:
    image: bigdata-zookeeper:latest
    container_name: zoo1
    hostname: zoo1
    ports:
      - "2181:2181"  # 客户端连接端口
    environment:
      ZOO_MY_ID: 1  # 节点唯一标识
    volumes:
      - ./config/zookeeper:/config/zookeeper  # 配置目录
      - zoo1_data:/opt/zookeeper/data        # 数据持久化
      - zoo1_datalog:/opt/zookeeper/datalog   # 事务日志持久化
    networks:
      - bigdata-net

  # ===============================================
  # ZooKeeper节点2配置
  # 作用：ZooKeeper集群的第二个节点
  # 原理：通过不同的主机端口实现多节点部署
  # 端口映射：2182映射到容器内的2181端口
  # ===============================================
  zoo2:
    image: bigdata-zookeeper:latest
    container_name: zoo2
    hostname: zoo2
    ports:
      - "2182:2181"  # 客户端连接端口（不同主机端口）
    environment:
      ZOO_MY_ID: 2  # 节点唯一标识
    volumes:
      - ./config/zookeeper:/config/zookeeper
      - zoo2_data:/opt/zookeeper/data
      - zoo2_datalog:/opt/zookeeper/datalog
    networks:
      - bigdata-net

  # ===============================================
  # ZooKeeper节点3配置
  # 作用：ZooKeeper集群的第三个节点，形成仲裁集群
  # 原理：3节点集群确保在单节点故障时仍能形成多数派
  # 端口映射：2183映射到容器内的2181端口
  # ===============================================
  zoo3:
    image: bigdata-zookeeper:latest
    container_name: zoo3
    hostname: zoo3
    ports:
      - "2183:2181"  # 客户端连接端口（不同主机端口）
    environment:
      ZOO_MY_ID: 3
    volumes:
      - ./config/zookeeper:/config/zookeeper
      - zoo3_data:/opt/zookeeper/data
      - zoo3_datalog:/opt/zookeeper/datalog
    networks:
      - bigdata-net

volumes:
  zoo1_data:
  zoo1_datalog:
  zoo2_data:
  zoo2_datalog:
  zoo3_data:
  zoo3_datalog:

networks:
  bigdata-net:
    external: true
