# ===============================================
# Kafka集群Docker Compose配置文件
# 作用：定义Kafka消息队列集群的容器编排配置
# 原理：使用3节点集群实现高可用和消息冗余
# 架构：3个Broker节点，每个节点使用独立的配置文件
# ===============================================

version: '3.8'

# ===============================================
# Kafka Broker通用配置模板
# 作用：定义Kafka Broker节点的通用配置，避免重复定义
# 原理：使用YAML锚点(anchor)和引用(alias)实现配置复用
# 配置说明：所有Broker节点共享基础镜像和网络配置
# ===============================================

x-kafka-broker: &kafka-broker
  image: bigdata-kafka:latest
  entrypoint: /opt/kafka/bin/kafka-server-start.sh
  networks:
    - bigdata-net

# ===============================================
# 服务定义部分
# 作用：定义Kafka集群中的各个Broker节点
# 原理：每个Broker使用独立的配置文件和数据目录
# 节点说明：3节点集群确保消息的高可用性和负载均衡
# ===============================================

services:
  # ===============================================
  # Kafka Broker 1配置
  # 作用：Kafka集群的第一个Broker节点
  # 原理：使用server.properties配置文件，broker.id=1
  # 端口映射：19092 -> 9092，避免与主机端口冲突
  # ===============================================
  kafka1:
    <<: *kafka-broker
    container_name: kafka1
    hostname: kafka1
    command: /opt/kafka/config/server.properties
    volumes:
      - ./config/kafka/server.properties:/opt/kafka/config/server.properties:ro
      - ./data/kafka/kafka1:/opt/kafka/data
    ports:
      - "19092:9092"

  # ===============================================
  # Kafka Broker 2配置
  # 作用：Kafka集群的第二个Broker节点
  # 原理：使用server2.properties配置文件，broker.id=2
  # 端口映射：19093 -> 9092，使用不同主机端口
  # ===============================================
  kafka2:
    <<: *kafka-broker
    container_name: kafka2
    hostname: kafka2
    command: /opt/kafka/config/server2.properties
    volumes:
      - ./config/kafka/server2.properties:/opt/kafka/config/server2.properties:ro
      - ./data/kafka/kafka2:/opt/kafka/data
    ports:
      - "19093:9092"
    depends_on:
      - kafka1

  kafka3:
    <<: *kafka-broker
    container_name: kafka3
    hostname: kafka3
    command: /opt/kafka/config/server3.properties
    volumes:
      - ./config/kafka/server3.properties:/opt/kafka/config/server3.properties:ro
      - ./data/kafka/kafka3:/opt/kafka/data
    ports:
      - "19094:9092"
    depends_on:
      - kafka1

networks:
  bigdata-net:
    external: true