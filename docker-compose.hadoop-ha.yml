version: '3.8'

services:
  journalnode1:
    image: bigdata-hadoop:latest
    container_name: journalnode1
    hostname: journalnode1
    entrypoint: ["hadoop-ha-entrypoint.sh"]
    command: ["journalnode"]
    volumes:
      - ./config/hadoop-ha:/config/hadoop-ha
      - jn1_data:/opt/hadoop/data
    networks:
      - bigdata-net

  journalnode2:
    image: bigdata-hadoop:latest
    container_name: journalnode2
    hostname: journalnode2
    entrypoint: ["hadoop-ha-entrypoint.sh"]
    command: ["journalnode"]
    volumes:
      - ./config/hadoop-ha:/config/hadoop-ha
      - jn2_data:/opt/hadoop/data
    networks:
      - bigdata-net

  journalnode3:
    image: bigdata-hadoop:latest
    container_name: journalnode3
    hostname: journalnode3
    entrypoint: ["hadoop-ha-entrypoint.sh"]
    command: ["journalnode"]
    volumes:
      - ./config/hadoop-ha:/config/hadoop-ha
      - jn3_data:/opt/hadoop/data
    networks:
      - bigdata-net

  namenode1:
    image: bigdata-hadoop:latest
    container_name: namenode1
    hostname: namenode1
    entrypoint: ["hadoop-ha-entrypoint.sh"]
    command: ["namenode1"]
    depends_on:
      - journalnode1
      - journalnode2
      - journalnode3
    ports:
      - "19870:9870"
      - "18088:8088"
      - "19888:19888"
    volumes:
      - ./config/hadoop-ha:/config/hadoop-ha
      - nn1_data:/opt/hadoop/data
    networks:
      - bigdata-net

  namenode2:
    image: bigdata-hadoop:latest
    container_name: namenode2
    hostname: namenode2
    entrypoint: ["hadoop-ha-entrypoint.sh"]
    command: ["namenode2"]
    depends_on:
      - namenode1
    ports:
      - "29870:9870"
      - "28088:8088"
    volumes:
      - ./config/hadoop-ha:/config/hadoop-ha
      - nn2_data:/opt/hadoop/data
    networks:
      - bigdata-net

  datanode1:
    image: bigdata-hadoop:latest
    container_name: datanode1
    hostname: datanode1
    entrypoint: ["hadoop-ha-entrypoint.sh"]
    command: ["datanode"]
    depends_on:
      - namenode1
      - namenode2
    ports:
      - "19864:9864"
    volumes:
      - ./config/hadoop-ha:/config/hadoop-ha
      - dn1_data:/opt/hadoop/data
    networks:
      - bigdata-net

  datanode2:
    image: bigdata-hadoop:latest
    container_name: datanode2
    hostname: datanode2
    entrypoint: ["hadoop-ha-entrypoint.sh"]
    command: ["datanode"]
    depends_on:
      - namenode1
      - namenode2
    ports:
      - "19865:9864"
    volumes:
      - ./config/hadoop-ha:/config/hadoop-ha
      - dn2_data:/opt/hadoop/data
    networks:
      - bigdata-net

volumes:
  jn1_data:
  jn2_data:
  jn3_data:
  nn1_data:
  nn2_data:
  dn1_data:
  dn2_data:

networks:
  bigdata-net:
    external: true
