# ===============================================
# 5节点全栈集群Docker Compose配置文件
# 作用：定义5节点大数据全栈集群的容器编排配置
# 原理：使用统一镜像，根据节点角色启动相应的服务组合
# 架构：1个master节点 + 3个worker节点 + 1个infra节点
# 内存限制：严格控制在16GB物理内存环境下运行
# ===============================================

version: '3.8'

# ===============================================
# 网络配置
# 作用：定义容器网络，确保节点间通信
# 原理：使用自定义网络，支持容器间DNS解析
# ===============================================

networks:
  bigdata-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ===============================================
# 数据卷配置
# 作用：定义持久化数据存储卷
# 原理：使用命名卷确保数据持久化
# ===============================================

volumes:
  # Hadoop数据卷
  hadoop-data-master:
  hadoop-data-worker1:
  hadoop-data-worker2:
  hadoop-data-worker3:
  
  # ZooKeeper数据卷
  zk-data-worker1:
  zk-data-worker2:
  zk-data-worker3:
  
  # Kafka数据卷
  kafka-data-worker1:
  kafka-data-worker2:
  kafka-data-worker3:
  
  # HBase数据卷
  hbase-data-worker1:
  hbase-data-worker2:
  hbase-data-worker3:
  
  # MySQL数据卷
  mysql-data-infra:

# ===============================================
# 服务定义部分
# 作用：定义5个节点的容器配置
# 原理：每个节点使用相同的镜像，但根据主机名启动不同的服务
# ===============================================

services:
  # ===============================================
  # Master节点配置
  # 作用：管理主节点，运行管理类服务
  # 服务：NameNode, ResourceManager, HMaster, Hive Metastore, HiveServer2, Spark Master, Flink JobManager
  # 内存：4.0GB (512M*4 + 1G + 512M*2)
  # ===============================================
  master:
    image: bigdata-all-in-one:latest
    container_name: master
    hostname: master
    entrypoint: /scripts/all-in-one-entrypoint.sh
    ports:
      # Hadoop Web UI端口
      - "29870:9870"  # HDFS NameNode Web UI
      - "28088:8088"  # YARN ResourceManager Web UI
      - "29888:19888" # YARN JobHistory Web UI
      
      # HBase Web UI端口
      - "26010:16010" # HBase Master Web UI
      
      # Hive Web UI端口
      - "21001:10000" # HiveServer2 JDBC端口
      - "21002:10002" # HiveServer2 Web UI
      
      # Spark Web UI端口
      - "28080:8080"   # Spark Master Web UI
      - "27077:7077"   # Spark Master通信端口
      
      # Flink Web UI端口
      - "28081:8081"   # Flink JobManager Web UI
    volumes:
      # 配置文件卷
      - ./config/all-in-one:/config/all-in-one
      # 脚本文件卷
      - ./scripts:/scripts
      # 数据卷
      - hadoop-data-master:/opt/hadoop/data
    networks:
      - bigdata-net
    environment:
      # 内存限制环境变量
      - HADOOP_HEAPSIZE=512
      - YARN_RESOURCEMANAGER_HEAPSIZE=512
      - HBASE_MASTER_OPTS=-Xmx512m
      - HIVE_METASTORE_HEAPSIZE=512
      - HIVE_SERVER2_HEAPSIZE=1024
      - SPARK_MASTER_MEMORY=512m
      - JOBMANAGER_MEMORY_PROCESS_SIZE=512m

  # ===============================================
  # Worker-1节点配置
  # 作用：计算/存储从节点1，运行数据处理服务
  # 服务：DataNode, NodeManager, RegionServer, ZooKeeper, Kafka Broker, Spark Worker, Flink TaskManager
  # 内存：3.5GB (256M+512M+1G+128M+512M*3)
  # ===============================================
  worker-1:
    image: bigdata-all-in-one:latest
    container_name: worker-1
    hostname: worker-1
    entrypoint: /scripts/all-in-one-entrypoint.sh
    volumes:
      # 配置文件卷
      - ./config/all-in-one:/config/all-in-one
      # 脚本文件卷
      - ./scripts:/scripts
      # 数据卷
      - hadoop-data-worker1:/opt/hadoop/data
      - zk-data-worker1:/opt/zookeeper/data
      - kafka-data-worker1:/opt/kafka/data
      - hbase-data-worker1:/opt/hbase/data
    networks:
      - bigdata-net
    environment:
      # 内存限制环境变量
      - HADOOP_DATANODE_OPTS=-Xmx256m
      - YARN_NODEMANAGER_HEAPSIZE=512
      - HBASE_REGIONSERVER_OPTS=-Xmx1024m
      - SERVER_JVMFLAGS=-Xmx128m
      - KAFKA_HEAP_OPTS=-Xmx512m -Xms512m
      - SPARK_WORKER_MEMORY=512m
      - TASKMANAGER_MEMORY_PROCESS_SIZE=512m
      # ZooKeeper节点ID
      - ZOO_MY_ID=1

  # ===============================================
  # Worker-2节点配置
  # 作用：计算/存储从节点2，运行数据处理服务
  # 服务：DataNode, NodeManager, RegionServer, ZooKeeper, Kafka Broker, Spark Worker, Flink TaskManager
  # 内存：3.5GB
  # ===============================================
  worker-2:
    image: bigdata-all-in-one:latest
    container_name: worker-2
    hostname: worker-2
    entrypoint: /scripts/all-in-one-entrypoint.sh
    volumes:
      # 配置文件卷
      - ./config/all-in-one:/config/all-in-one
      # 脚本文件卷
      - ./scripts:/scripts
      # 数据卷
      - hadoop-data-worker2:/opt/hadoop/data
      - zk-data-worker2:/opt/zookeeper/data
      - kafka-data-worker2:/opt/kafka/data
      - hbase-data-worker2:/opt/hbase/data
    networks:
      - bigdata-net
    environment:
      # 内存限制环境变量
      - HADOOP_DATANODE_OPTS=-Xmx256m
      - YARN_NODEMANAGER_HEAPSIZE=512
      - HBASE_REGIONSERVER_OPTS=-Xmx1024m
      - SERVER_JVMFLAGS=-Xmx128m
      - KAFKA_HEAP_OPTS=-Xmx512m -Xms512m
      - SPARK_WORKER_MEMORY=512m
      - TASKMANAGER_MEMORY_PROCESS_SIZE=512m
      # ZooKeeper节点ID
      - ZOO_MY_ID=2

  # ===============================================
  # Worker-3节点配置
  # 作用：计算/存储从节点3，运行数据处理服务
  # 服务：DataNode, NodeManager, RegionServer, ZooKeeper, Kafka Broker, Spark Worker, Flink TaskManager
  # 内存：3.5GB
  # ===============================================
  worker-3:
    image: bigdata-all-in-one:latest
    container_name: worker-3
    hostname: worker-3
    entrypoint: /scripts/all-in-one-entrypoint.sh
    volumes:
      # 配置文件卷
      - ./config/all-in-one:/config/all-in-one
      # 脚本文件卷
      - ./scripts:/scripts
      # 数据卷
      - hadoop-data-worker3:/opt/hadoop/data
      - zk-data-worker3:/opt/zookeeper/data
      - kafka-data-worker3:/opt/kafka/data
      - hbase-data-worker3:/opt/hbase/data
    networks:
      - bigdata-net
    environment:
      # 内存限制环境变量
      - HADOOP_DATANODE_OPTS=-Xmx256m
      - YARN_NODEMANAGER_HEAPSIZE=512
      - HBASE_REGIONSERVER_OPTS=-Xmx1024m
      - SERVER_JVMFLAGS=-Xmx128m
      - KAFKA_HEAP_OPTS=-Xmx512m -Xms512m
      - SPARK_WORKER_MEMORY=512m
      - TASKMANAGER_MEMORY_PROCESS_SIZE=512m
      # ZooKeeper节点ID
      - ZOO_MY_ID=3

  # ===============================================
  # Infra节点配置
  # 作用：网关/辅助节点，运行基础设施服务
  # 服务：MySQL, Flume Agent, CLI Clients
  # 内存：1.0GB (MySQL+256M+Buffer)
  # ===============================================
  infra:
    image: bigdata-all-in-one:latest
    container_name: infra
    hostname: infra
    entrypoint: /scripts/all-in-one-entrypoint.sh
    ports:
      - "3307:3306"
      - "41414:41414"
    volumes:
      - ./config/all-in-one:/config/all-in-one
      # 脚本文件卷
      - ./scripts:/scripts
      - mysql-data-infra:/var/lib/mysql
    networks:
      - bigdata-net
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=hive_metastore
      - MYSQL_USER=hive
      - MYSQL_PASSWORD=hive

# ===============================================
# 服务依赖关系
# 作用：定义服务启动顺序，确保依赖关系正确
# 原理：使用depends_on确保基础服务先启动
# ===============================================

# 注意：在实际部署时，需要按以下顺序启动服务：
# 1. 基础层: ZooKeeper -> HDFS
# 2. 调度层: YARN -> Spark Master -> Flink JobManager
# 3. 数据层: Kafka -> HBase -> Hive Metastore -> HiveServer2
# 4. 接入层: Flume

# 由于Supervisor会同时管理多个服务，这里使用启动脚本来控制启动顺序