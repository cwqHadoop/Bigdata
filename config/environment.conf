# 大数据平台环境配置
# 此配置文件用于指定使用哪种Hadoop集群环境

# 可选值: "ha" 或 "standard"
# ha: 使用Hadoop HA高可用集群配置
# standard: 使用标准Hadoop集群配置
HADOOP_ENVIRONMENT=standard

# 集群网络配置
CLUSTER_NETWORK=bigdata-net

# 组件版本信息
HADOOP_VERSION=3.1.3
SPARK_VERSION=3.1.1
ZOOKEEPER_VERSION=3.6.3
HBASE_VERSION=2.2.3
HIVE_VERSION=3.1.2
FLINK_VERSION=1.14.0
FLUME_VERSION=1.9.0
KAFKA_VERSION=2.4.1
