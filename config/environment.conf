# ===============================================
# 大数据平台环境配置文件
# 作用：统一管理整个大数据平台的配置参数和版本信息
# 原理：各组件启动脚本读取此文件，确保配置一致性
# 重要性：平台的核心配置文件，影响所有组件的部署和运行
# ===============================================

# ===============================================
# Hadoop集群环境配置
# 作用：指定使用哪种Hadoop集群模式
# 可选值: "ha" 或 "standard"
# ha: 使用Hadoop高可用集群配置（推荐生产环境）
# standard: 使用标准Hadoop集群配置（适合开发测试）
# 原理：根据此配置选择对应的Docker Compose文件和配置文件
# ===============================================
HADOOP_ENVIRONMENT=ha

# ===============================================
# 集群网络配置
# 作用：定义Docker容器使用的网络名称
# 原理：所有大数据组件在同一个Docker网络中，便于服务发现
# 网络模式：桥接网络，容器间通过容器名进行通信
# ===============================================
CLUSTER_NETWORK=bigdata-net

# ===============================================
# 组件版本信息配置
# 作用：统一管理各大数据组件的版本号
# 原理：构建脚本和启动脚本读取这些版本信息
# 重要性：确保组件版本兼容性，便于版本管理和升级
# ===============================================

# Hadoop分布式计算框架版本
HADOOP_VERSION=3.1.3

# Spark内存计算引擎版本
SPARK_VERSION=3.1.1

# ZooKeeper分布式协调服务版本
ZOOKEEPER_VERSION=3.6.3

# HBase分布式NoSQL数据库版本
HBASE_VERSION=2.2.3

# Hive数据仓库工具版本
HIVE_VERSION=3.1.2

# Flink流处理引擎版本
FLINK_VERSION=1.14.0

# Flume数据采集工具版本
FLUME_VERSION=1.9.0

# Kafka分布式消息队列版本
KAFKA_VERSION=2.4.1
