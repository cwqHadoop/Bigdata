# ===============================================
# Kafka Broker配置文件 (节点1)
# 作用：配置Kafka消息队列集群中单个Broker节点的参数
# 原理：Kafka启动时读取此文件，建立与ZooKeeper的连接和消息存储配置
# 重要性：Kafka集群的核心配置文件，影响消息存储和集群协调
# ===============================================

# ===============================================
# Broker标识配置
# 作用：指定Kafka Broker的唯一标识符
# 原理：每个Broker在集群中必须有唯一的ID，用于服务发现和协调
# 取值范围：正整数，集群中每个Broker的ID必须不同
# ===============================================
broker.id=1

# ===============================================
# ZooKeeper连接配置
# 作用：指定Kafka集群使用的ZooKeeper集群地址
# 原理：Kafka依赖ZooKeeper进行集群协调、元数据管理和领导者选举
# 连接格式：逗号分隔的ZooKeeper节点地址列表
# ===============================================
zookeeper.connect=zoo1:2181,zoo2:2181,zoo3:2181

# ===============================================
# 监听器配置
# 作用：指定Kafka Broker监听的网络地址和协议
# 原理：客户端通过此地址与Broker建立连接
# 协议说明：PLAINTEXT表示使用明文通信（生产环境应使用SSL）
# ===============================================
listeners=PLAINTEXT://0.0.0.0:9092

# ===============================================
# 对外公布监听器配置
# 作用：指定客户端实际连接Broker时使用的地址
# 原理：在容器环境中，需要使用容器名而非IP地址进行服务发现
# 地址格式：使用容器名kafka1，确保客户端能正确连接到Broker
# ===============================================
advertised.listeners=PLAINTEXT://kafka1:9092

# ===============================================
# 日志目录配置
# 作用：指定Kafka消息日志的存储目录
# 原理：Kafka将消息以日志文件形式存储在磁盘上
# 路径说明：/opt/kafka/data是Kafka的默认数据目录
# ===============================================
log.dirs=/opt/kafka/data

# ===============================================
# 分区数量配置
# 作用：指定新创建主题的默认分区数量
# 原理：分区是Kafka并行处理的基本单位，影响消息的并行处理能力
# 推荐值：根据集群规模和性能需求调整，通常设置为Broker数量的倍数
# ===============================================
num.partitions=3

# ===============================================
# 默认副本因子配置
# 作用：指定新创建主题的默认副本数量
# 原理：副本提供数据冗余，确保在Broker故障时数据不丢失
# 推荐值：通常设置为3，确保数据的高可用性
# ===============================================
default.replication.factor=3

# ===============================================
# 最小同步副本配置
# 作用：指定生产者确认消息写入所需的最小同步副本数量
# 原理：控制消息持久化的可靠性级别
# 推荐值：通常设置为副本因子减1，平衡可靠性和性能
# ===============================================
min.insync.replicas=2

# ===============================================
# 主题删除功能配置
# 作用：启用或禁用主题删除功能
# 原理：启用后允许通过管理工具删除不再需要的主题
# 安全考虑：生产环境应谨慎启用，避免误删重要主题
# ===============================================
delete.topic.enable=true