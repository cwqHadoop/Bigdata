# ===============================================
# Spark内存计算引擎默认配置文件
# 作用：配置Spark集群的Master地址、内存分配、日志存储等参数
# 原理：Spark应用程序启动时读取此文件，建立集群连接和资源配置
# 重要性：Spark的核心配置文件，影响任务执行性能和资源利用率
# ===============================================

# Spark Master地址配置
# 作用：指定Spark集群的Master服务地址
# 原理：Spark Driver通过此地址与集群Master建立连接
# 地址格式：spark://主机名:端口号
spark.master                     spark://spark-master:7077

# 应用程序名称配置
# 作用：指定Spark应用程序的默认名称
# 原理：用于在Spark Web UI和日志中标识应用程序
spark.app.name                   Spark Application

# Driver内存配置
# 作用：指定Spark Driver进程的堆内存大小
# 原理：Driver负责任务调度和结果收集，需要足够的内存
spark.driver.memory              1g

# Executor内存配置
# 作用：指定每个Executor进程的堆内存大小
# 原理：Executor负责实际的任务执行，内存大小影响任务性能
spark.executor.memory            1g

# Executor核心数配置
# 作用：指定每个Executor可以使用的CPU核心数量
# 原理：影响Executor的并行任务执行能力
spark.executor.cores             2

# Executor实例数配置
# 作用：指定应用程序启动的Executor实例数量
# 原理：决定应用程序在集群中的并行执行程度
spark.executor.instances         2

# 事件日志启用配置
# 作用：启用或禁用Spark事件日志记录功能
# 原理：事件日志用于记录应用程序的执行历史和性能指标
spark.eventLog.enabled           true

# 事件日志目录配置
# 作用：指定事件日志在HDFS中的存储位置
# 原理：使用HDFS存储确保事件日志的持久化和高可用性
spark.eventLog.dir               hdfs://namenode:8020/spark-logs

# 历史服务器日志目录配置
# 作用：指定Spark历史服务器读取事件日志的目录
# 原理：历史服务器通过此目录读取已完成应用程序的日志
spark.history.fs.logDirectory    hdfs://namenode:8020/spark-logs

# YARN历史服务器地址配置
# 作用：指定YARN历史服务器的服务地址
# 原理：在YARN模式下，历史服务器用于查看应用程序历史
spark.yarn.historyServer.address spark-master:18080

# 序列化器配置
# 作用：指定Spark使用的数据序列化器
# 原理：Kryo序列化器比Java序列化器更高效，减少序列化开销
spark.serializer                 org.apache.spark.serializer.KryoSerializer

# 动态资源分配配置
# 作用：启用或禁用Spark的动态资源分配功能
# 原理：动态分配可以根据任务负载自动调整Executor数量
spark.dynamicAllocation.enabled  false

# Shuffle服务启用配置
# 作用：启用或禁用外部Shuffle服务
# 原理：外部Shuffle服务可以提高Shuffle操作的稳定性和性能
spark.shuffle.service.enabled    false