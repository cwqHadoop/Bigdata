# ===============================================
# Supervisor主配置文件
# 作用：配置Supervisor进程管理器的基本参数
# 原理：Supervisor作为主进程，管理所有大数据组件的子进程
# 重要性：确保5节点架构中单个节点能稳定运行多个服务
# ===============================================

[unix_http_server]
file=/var/run/supervisor.sock   ; socket文件路径
chmod=0700                       ; socket文件权限

[supervisord]
logfile=/var/log/supervisor/supervisord.log  ; 主进程日志文件
logfile_maxbytes=50MB                        ; 日志文件最大大小
logfile_backups=10                           ; 日志文件备份数量
loglevel=info                                ; 日志级别
pidfile=/var/run/supervisord.pid             ; PID文件路径
nodaemon=false                               ; 是否以守护进程方式运行
minfds=1024                                  ; 最小文件描述符数量
minprocs=200                                 ; 最小进程数量

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock    ; 控制端socket路径

# ===============================================
# 包含所有服务配置文件
# 作用：包含各大数据组件的服务配置文件
# 原理：将不同组件的配置分离到独立文件中，便于管理
# ===============================================

[include]
files = /etc/supervisor/conf.d/*.conf