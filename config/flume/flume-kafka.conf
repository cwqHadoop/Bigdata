# ===============================================
# Flume数据采集Agent配置文件
# 作用：配置Flume Agent从日志文件采集数据并发送到Kafka
# 原理：Flume采用Source-Channel-Sink架构实现数据流处理
# 重要性：实现日志数据的实时采集和传输到消息队列
# ===============================================

# ===============================================
# Agent组件定义
# 作用：定义Flume Agent的Source、Channel、Sink组件
# 原理：Agent是Flume的基本运行单元，包含完整的数据流处理链
# 组件说明：
#   - sources: 数据源组件，负责数据采集
#   - channels: 通道组件，负责数据缓冲
#   - sinks: 输出组件，负责数据发送
# ===============================================

# Flume Agent配置 - 日志采集到Kafka
agent2.sources = log-source
agent2.channels = memory-channel
agent2.sinks = kafka-sink

# ===============================================
# Source配置 - 日志文件监控
# 作用：配置Flume从日志文件实时采集数据
# 原理：使用exec类型的Source，通过tail命令监控文件变化
# 参数说明：
#   - type: exec表示执行外部命令
#   - command: tail -F命令实时监控文件追加
#   - batchSize: 每次批量处理的事件数量
#   - batchDurationMillis: 批量处理的超时时间
# ===============================================

# Source配置 - 监控日志文件
agent2.sources.log-source.type = exec
agent2.sources.log-source.command = tail -F /var/log/application/application.log
agent2.sources.log-source.batchSize = 100
agent2.sources.log-source.batchDurationMillis = 2000

# ===============================================
# Channel配置 - 内存通道
# 作用：配置内存缓冲区，临时存储采集的数据
# 原理：使用内存通道提供高性能的数据缓冲
# 参数说明：
#   - type: memory表示使用内存通道
#   - capacity: 通道的最大容量（事件数量）
#   - transactionCapacity: 单次事务处理的最大事件数量
# ===============================================

# Channel配置 - 内存通道
agent2.channels.memory-channel.type = memory
agent2.channels.memory-channel.capacity = 10000
agent2.channels.memory-channel.transactionCapacity = 1000

# ===============================================
# Sink配置 - Kafka输出
# 作用：配置Flume将数据发送到Kafka消息队列
# 原理：使用KafkaSink将数据写入Kafka主题
# 参数说明：
#   - type: 指定KafkaSink类型
#   - brokerList: Kafka集群Broker地址列表
#   - topic: 目标Kafka主题名称
#   - batchSize: 批量发送的事件数量
#   - requiredAcks: 消息确认机制（1表示Leader确认）
# ===============================================

# Sink配置 - 写入Kafka
agent2.sinks.kafka-sink.type = org.apache.flume.sink.kafka.KafkaSink
agent2.sinks.kafka-sink.brokerList = kafka1:9092,kafka2:9092,kafka3:9092
agent2.sinks.kafka-sink.topic = flume-logs
agent2.sinks.kafka-sink.batchSize = 100
agent2.sinks.kafka-sink.requiredAcks = 1

# ===============================================
# 组件绑定配置
# 作用：将Source、Channel、Sink组件连接成完整的数据流
# 原理：Source将数据写入Channel，Sink从Channel读取数据
# 绑定说明：
#   - sources.channels: Source连接到哪个Channel
#   - sinks.channel: Sink连接到哪个Channel
# ===============================================

# 绑定Source、Channel、Sink
agent2.sources.log-source.channels = memory-channel
agent2.sinks.kafka-sink.channel = memory-channel