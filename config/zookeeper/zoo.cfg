# ===============================================
# ZooKeeper分布式协调服务配置文件
# 作用：配置ZooKeeper集群的基本参数、集群成员和网络设置
# 原理：ZooKeeper启动时读取此文件，建立集群协调和通信机制
# 重要性：ZooKeeper是分布式系统的核心协调组件，影响集群稳定性
# ===============================================

# ===============================================
# 基本时间参数配置
# 作用：定义ZooKeeper集群中的基本时间单位
# 原理：tickTime是ZooKeeper的时间基准单位（毫秒）
# 用途：用于计算会话超时、心跳间隔等时间相关参数
# ===============================================
tickTime=2000

# ===============================================
# 初始化超时配置
# 作用：指定Followers与Leader建立连接的初始化超时时间
# 原理：initLimit * tickTime = 初始化超时时间（毫秒）
# 重要性：确保集群在启动时有足够的时间完成初始化
# ===============================================
initLimit=10

# ===============================================
# 同步超时配置
# 作用：指定Followers与Leader同步数据的超时时间
# 原理：syncLimit * tickTime = 同步超时时间（毫秒）
# 重要性：确保数据同步在合理时间内完成
# ===============================================
syncLimit=5

# ===============================================
# 数据目录配置
# 作用：指定ZooKeeper数据快照的存储目录
# 原理：ZooKeeper将内存数据定期快照到此目录
# 重要性：数据目录包含集群的状态信息和事务日志
# ===============================================
dataDir=/opt/zookeeper/data

# ===============================================
# 事务日志目录配置
# 作用：指定ZooKeeper事务日志的存储目录
# 原理：所有写操作都会先记录到事务日志，确保数据持久化
# 重要性：事务日志用于数据恢复和一致性保证
# ===============================================
dataLogDir=/opt/zookeeper/datalog

# ===============================================
# 客户端连接端口配置
# 作用：指定ZooKeeper服务监听客户端连接的端口
# 原理：客户端通过此端口与ZooKeeper集群建立连接
# 端口说明：2181是ZooKeeper的标准客户端端口
# ===============================================
clientPort=2181

# ===============================================
# 集群成员配置
# 作用：定义ZooKeeper集群中的所有服务器节点
# 原理：每个服务器通过唯一的ID标识，格式：server.id=host:port1:port2
# 端口说明：
#   - 2888: 集群内节点间通信端口
#   - 3888: 领导者选举端口
# ===============================================
server.1=zoo1:2888:3888
server.2=zoo2:2888:3888
server.3=zoo3:2888:3888

# ===============================================
# 四字命令白名单配置
# 作用：启用ZooKeeper的四字命令用于测试和监控
# 原理：四字命令是ZooKeeper的管理命令，通过telnet或nc执行
# 安全考虑：生产环境应限制可用的四字命令
# ===============================================

# 启用所有四字命令用于测试
4lw.commands.whitelist=*
