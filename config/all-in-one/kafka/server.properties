# ===============================================
# Kafka Broker配置文件 (worker-1节点)
# 作用：定义Kafka消息代理的运行参数
# 原理：3节点Kafka集群，提供高可用的消息队列服务
# 节点：worker-1, worker-2, worker-3 运行Kafka Broker
# 内存限制：512MB堆内存，严格控制在16GB总内存内
# ===============================================

# ===============================================
# Broker基础配置
# 作用：定义Broker的唯一标识和基础参数
# ===============================================

# Broker唯一标识
broker.id=1

# 监听地址和端口
listeners=PLAINTEXT://0.0.0.0:9092

# 广告地址（供客户端连接）
advertised.listeners=PLAINTEXT://worker-1:9092

# ===============================================
# ZooKeeper连接配置
# 作用：定义Kafka与ZooKeeper集群的连接信息
# 原理：Kafka使用ZooKeeper进行元数据管理和协调
# ===============================================

# ZooKeeper连接字符串
zookeeper.connect=worker-1:2181,worker-2:2181,worker-3:2181

# ZooKeeper会话超时时间
zookeeper.session.timeout.ms=6000

# ZooKeeper连接超时时间
zookeeper.connection.timeout.ms=6000

# ===============================================
# 日志存储配置
# 作用：定义Kafka消息日志的存储参数
# ===============================================

# 日志数据目录
log.dirs=/opt/kafka/data

# 日志保留时间（小时）
log.retention.hours=168

# 日志文件最大大小
log.segment.bytes=1073741824

# 日志清理策略
log.cleanup.policy=delete

# ===============================================
# 主题配置
# 作用：定义主题的默认参数
# ===============================================

# 默认分区数量
num.partitions=3

# 默认副本因子
default.replication.factor=3

# ===============================================
# 网络和性能配置
# 作用：优化网络通信和系统性能
# ===============================================

# 消息最大大小
message.max.bytes=1000000

# 副本拉取最大字节数
replica.fetch.max.bytes=1048576

# 套接字发送缓冲区大小
socket.send.buffer.bytes=102400

# 套接字接收缓冲区大小
socket.receive.buffer.bytes=102400

# ===============================================
# 内存优化配置
# 作用：限制Kafka的内存使用，确保在16GB限制内运行
# ===============================================

# 页面缓存大小（限制内存使用）
log.cleaner.dedupe.buffer.size=67108864

# 索引缓冲区大小
log.index.size.max.bytes=10485760

# 刷新间隔（平衡性能和数据持久性）
log.flush.interval.messages=10000
log.flush.interval.ms=1000

# ===============================================
# 副本和ISR配置
# 作用：定义副本同步和故障恢复参数
# ===============================================

# 最小同步副本数量
min.insync.replicas=2

# 副本拉取等待时间
replica.fetch.wait.max.ms=500

# 副本拉取最小字节数
replica.fetch.min.bytes=1

# ===============================================
# 控制器配置
# 作用：定义控制器相关参数
# ===============================================

# 控制器套接字超时时间
controller.socket.timeout.ms=30000

# 控制器消息队列大小
controller.message.queue.size=10