# ===============================================
# 5节点全栈集群内存优化配置文件
# 作用：定义各大数据组件的内存限制参数
# 原理：通过环境变量和配置文件限制JVM堆内存大小
# 目标：确保总内存占用不超过15.5GB物理内存
# ===============================================

# ===============================================
# Hadoop内存配置
# 作用：限制Hadoop相关组件的内存使用
# 原理：通过环境变量控制JVM堆内存大小
# ===============================================

# NameNode内存限制 (512MB)
export HADOOP_NAMENODE_OPTS="-Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"

# DataNode内存限制 (256MB)
export HADOOP_DATANODE_OPTS="-Xmx256m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"

# ResourceManager内存限制 (512MB)
export YARN_RESOURCEMANAGER_HEAPSIZE=512

# NodeManager内存限制 (512MB)
export YARN_NODEMANAGER_HEAPSIZE=512

# MapReduce内存配置
export MAPRED_CHILD_OPTS="-Xmx256m"
export MAPRED_MAP_MEMORY_MB=256
export MAPRED_REDUCE_MEMORY_MB=512

# ===============================================
# HBase内存配置
# 作用：限制HBase相关组件的内存使用
# 原理：通过环境变量控制JVM堆内存大小
# ===============================================

# HMaster内存限制 (512MB)
export HBASE_MASTER_OPTS="-Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"

# RegionServer内存限制 (1024MB)
export HBASE_REGIONSERVER_OPTS="-Xmx1024m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"

# HBase堆内存配置
export HBASE_HEAPSIZE=1024

# ===============================================
# ZooKeeper内存配置
# 作用：限制ZooKeeper的内存使用
# 原理：通过环境变量控制JVM堆内存大小
# ===============================================

# ZooKeeper内存限制 (128MB)
export SERVER_JVMFLAGS="-Xmx128m -Xms128m -XX:+UseG1GC"

# ===============================================
# Kafka内存配置
# 作用：限制Kafka的内存使用
# 原理：通过环境变量控制JVM堆内存大小
# ===============================================

# Kafka内存限制 (512MB)
export KAFKA_HEAP_OPTS="-Xmx512m -Xms512m -XX:+UseG1GC"

# Kafka JVM参数
export KAFKA_JVM_PERFORMANCE_OPTS="-XX:MaxGCPauseMillis=20 -XX:InitiatingHeapOccupancyPercent=35"

# ===============================================
# Hive内存配置
# 作用：限制Hive相关组件的内存使用
# 原理：通过环境变量控制JVM堆内存大小
# ===============================================

# Hive Metastore内存限制 (512MB)
export HIVE_METASTORE_HEAPSIZE=512

# HiveServer2内存限制 (1024MB)
export HIVE_SERVER2_HEAPSIZE=1024

# Hive执行引擎内存配置
export HIVE_AUTO_COVERT_JOIN_NOCONDITIONALTASK_THRESHOLD=10
export HIVE_CBO_ENABLED=true

# ===============================================
# Spark内存配置
# 作用：限制Spark相关组件的内存使用
# 原理：通过环境变量控制内存分配
# ===============================================

# Spark Master内存限制 (512MB)
export SPARK_MASTER_MEMORY=512m

# Spark Worker内存限制 (512MB)
export SPARK_WORKER_MEMORY=512m

# Spark Executor内存配置
export SPARK_EXECUTOR_MEMORY=256m
export SPARK_DRIVER_MEMORY=256m
export SPARK_EXECUTOR_CORES=1

# ===============================================
# Flink内存配置
# 作用：限制Flink相关组件的内存使用
# 原理：通过环境变量控制内存分配
# ===============================================

# Flink JobManager内存限制 (512MB)
export JOBMANAGER_MEMORY_PROCESS_SIZE=512m

# Flink TaskManager内存限制 (512MB)
export TASKMANAGER_MEMORY_PROCESS_SIZE=512m

# Flink内存配置
export TASKMANAGER_MEMORY_MANAGED_SIZE=128m
export TASKMANAGER_NUMBEROFTASKSLOTS=1

# ===============================================
# 系统级内存优化
# 作用：优化系统级内存使用
# 原理：通过内核参数和系统配置优化内存管理
# ===============================================

# 系统交换空间配置 (建议开启Swap)
# echo 'vm.swappiness=10' >> /etc/sysctl.conf

# 文件描述符限制
ulimit -n 65536

# 内存回收优化
export GC_OPTS="-XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:G1HeapRegionSize=16m"

# ===============================================
# 节点级别内存分配总结
# 作用：明确每个节点的内存分配情况
# 原理：确保总内存占用不超过15.5GB
# ===============================================

# Master节点内存分配 (4.0GB)
# - NameNode: 512MB
# - ResourceManager: 512MB
# - HMaster: 512MB
# - Hive Metastore: 512MB
# - HiveServer2: 1024MB
# - Spark Master: 512MB
# - Flink JobManager: 512MB

# Worker节点内存分配 (3.5GB)
# - DataNode: 256MB
# - NodeManager: 512MB
# - RegionServer: 1024MB
# - ZooKeeper: 128MB
# - Kafka Broker: 512MB
# - Spark Worker: 512MB
# - Flink TaskManager: 512MB

# Infra节点内存分配 (1.0GB)
# - MySQL: 512MB
# - Flume: 256MB
# - Buffer: 256MB

# 总计内存占用: 4.0 + 3.5*3 + 1.0 = 15.5GB