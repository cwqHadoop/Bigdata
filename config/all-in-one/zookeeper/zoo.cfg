# ===============================================
# ZooKeeper集群配置文件
# 作用：定义ZooKeeper集群的节点配置和运行参数
# 原理：3节点仲裁集群，确保高可用性和数据一致性
# 节点：worker-1, worker-2, worker-3 运行ZooKeeper服务
# 内存限制：128MB堆内存，严格控制在16GB总内存内
# ===============================================

# 客户端连接端口
tickTime=2000
initLimit=10
syncLimit=5

# 数据目录和日志目录
dataDir=/opt/zookeeper/data
dataLogDir=/opt/zookeeper/datalog

# 客户端连接端口
clientPort=2181

# 四字命令白名单（ZooKeeper 3.5+需要显式启用）
4lw.commands.whitelist=*

# 管理员服务器配置（可选）
admin.serverPort=8080

# ===============================================
# ZooKeeper集群节点配置
# 作用：定义集群中各个ZooKeeper节点的连接信息
# 原理：每个节点有唯一的ID，通过TCP端口进行通信
# 格式：server.<id>=<host>:<peer_port>:<leader_election_port>
# ===============================================

# ZooKeeper节点1 (worker-1)
server.1=worker-1:2888:3888

# ZooKeeper节点2 (worker-2)
server.2=worker-2:2888:3888

# ZooKeeper节点3 (worker-3)
server.3=worker-3:2888:3888

# ===============================================
# 性能优化配置
# 作用：优化ZooKeeper在内存限制下的性能表现
# 原理：调整JVM参数和系统参数，提高运行效率
# ===============================================

# 最大客户端连接数
maxClientCnxns=60

# 会话超时时间
minSessionTimeout=4000
maxSessionTimeout=40000

# 自动清理快照和日志文件
autopurge.snapRetainCount=3
autopurge.purgeInterval=24

# 预分配大小，优化磁盘IO
preAllocSize=65536
snapCount=100000

# 内存优化配置
# 注意：JVM参数在启动脚本中通过环境变量设置
# SERVER_JVMFLAGS="-Xmx128m -Xms128m -XX:+UseG1GC"