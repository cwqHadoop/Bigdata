# ===============================================
# Flume Kafka配置
# 作用：配置Flume从Kafka采集数据的参数
# 原理：定义Source、Channel、Sink的配置关系
# ===============================================

# Agent名称
agent1.sources = kafka-source
agent1.channels = memory-channel
agent1.sinks = logger-sink

# Source配置 - Kafka Source
agent1.sources.kafka-source.type = org.apache.flume.source.kafka.KafkaSource
agent1.sources.kafka-source.batchSize = 100
agent1.sources.kafka-source.batchDurationMillis = 2000
agent1.sources.kafka-source.kafka.bootstrap.servers = worker-1:9092,worker-2:9092,worker-3:9092
agent1.sources.kafka-source.kafka.topics = flume-logs
agent1.sources.kafka-source.kafka.consumer.group.id = flume-consumer

# Channel配置 - Memory Channel
agent1.channels.memory-channel.type = memory
agent1.channels.memory-channel.capacity = 10000
agent1.channels.memory-channel.transactionCapacity = 1000

# Sink配置 - Logger Sink
agent1.sinks.logger-sink.type = logger

# 绑定Source到Channel
agent1.sources.kafka-source.channels = memory-channel

# 绑定Channel到Sink
agent1.sinks.logger-sink.channel = memory-channel